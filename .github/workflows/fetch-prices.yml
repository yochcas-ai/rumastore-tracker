name: Fetch eBay Prices

on:
  # Cron en UTC ГўВЂВ” Lima es UTC-5
  schedule:
    - cron: '0 13 * * *'   # 08:00 AM Lima ГўВ†В’ Apertura
    - cron: '0 22 * * *'   # 05:00 PM Lima ГўВ†В’ Atardecer
    - cron: '0 3  * * *'   # 10:00 PM Lima ГўВ†В’ Cierre
  # Permite correrlo manualmente desde GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Para hacer commit del prices.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch eBay prices
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
        run: node scripts/fetch-prices.js

      - name: Commit & push prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/prices.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
